services:
  # === Application Services ===

  elixir-api:
    build:
      context: ./elixir-api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_HOST: cockroachdb
      DATABASE_PORT: "26257"
      DATABASE_USER: root
      DATABASE_PASSWORD: ""
      DATABASE_NAME: chaos_events
      NATS_URL: nats://nats:4222
    depends_on:
      cockroachdb:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  rust-ws:
    build:
      context: ./rust-ws
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    environment:
      NATS_URL: nats://nats:4222
      KAFKA_BROKERS: redpanda:9092
      RUST_LOG: info
    depends_on:
      nats:
        condition: service_started
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  haskell-worker:
    build:
      context: ./haskell-worker
      dockerfile: Dockerfile
    environment:
      SCYLLA_HOST: scylladb
      SCYLLA_PORT: "9042"
      NATS_URL: nats://nats:4222
      POLL_INTERVAL: "10"
      WORKER_NAME: haskell-worker-1
    depends_on:
      scylladb:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "2080:2080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - elixir-api
      - rust-ws
    restart: unless-stopped

  # === Data Stores ===

  cockroachdb:
    image: cockroachdb/cockroach:v23.2.0
    command: start-single-node --insecure --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  scylladb:
    image: scylladb/scylla:5.4
    command: --smp 1 --memory 512M --overprovisioned 1
    ports:
      - "9042:9042"
      - "9142:9142"
    volumes:
      - scylla_data:/var/lib/scylla
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    command: -c /etc/nats/nats-server.conf
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_data:/data
    restart: unless-stopped

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.5
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "19092:19092"
      - "18082:18082"
      - "18081:18081"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  cockroach_data:
  scylla_data:
  nats_data:
  redpanda_data:
  caddy_data:
  caddy_config:
