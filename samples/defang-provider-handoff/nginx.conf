http {
    include mime.types;
    sendfile on;
    server {
        listen 8080;
        server_name localhost;

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            return 404;
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
        }

        location /cloud-setup/ {
            root /usr/share/nginx/html;
            try_files /cloud-setup.html =404;
        }
    }
}

events {}
