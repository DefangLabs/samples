http {
    include mime.types;
    sendfile on;
    server {
        listen 8080;
        server_name localhost;

        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}

events {}
