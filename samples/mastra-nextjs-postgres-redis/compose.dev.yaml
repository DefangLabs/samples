name: mastra-nextjs-postgres-redis-dev
services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: support-sync
      MOCK_AGENT: "true"
      LLM_MODEL: mock
      EMBEDDING_MODEL: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  worker:
    build:
      context: ./app
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable
      REDIS_URL: redis://redis:6379
      QUEUE_NAME: support-sync
      MOCK_AGENT: "true"
      LLM_MODEL: mock
      EMBEDDING_MODEL: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
    ports:
      - 5432:5432
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  redis:
    image: redis:6.2
    ports:
      - 6379:6379
